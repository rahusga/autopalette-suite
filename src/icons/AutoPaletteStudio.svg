<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>AutoPalette Studio</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9fbff"/>
      <stop offset="1" stop-color="#9eeeff"/>
    </linearGradient>
    <linearGradient id="nebula" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ad7ff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#b16cff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffcf6f" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="14" fill="url(#bg)" stroke="#62b7da" stroke-width="4"/>
  <circle cx="96" cy="32" r="9" fill="#ffffff" opacity="0.85"/>
  <circle cx="31" cy="91" r="2.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="98" cy="84" r="2.2" fill="#ffffff" opacity="0.9"/>
  <circle cx="27" cy="31" r="1.8" fill="#ffffff" opacity="0.9"/>

  <path d="M24 72 C38 37, 74 29, 101 49 C75 45, 49 57, 24 72 Z" fill="url(#nebula)" opacity="0.62" filter="url(#soft)"/>
  <path d="M28 75 C48 84, 75 79, 100 56" fill="none" stroke="#7b2cbf" stroke-width="5" stroke-linecap="round" opacity="0.38"/>
  <path d="M33 82 C54 63, 78 52, 106 59" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.72"/>

  <text x="64" y="81" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700"
        fill="#6a1b9a" stroke="#ffffff" stroke-width="1.6" paint-order="stroke fill">AS</text>
</svg>
